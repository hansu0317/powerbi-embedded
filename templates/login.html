<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - Power BI 보고서 뷰어</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo .icon { font-size: 2.5rem; }
    .logo h1 { font-size: 1.2rem; color: #333; margin-top: 10px; font-weight: 600; }
    .logo p { font-size: 0.82rem; color: #999; margin-top: 4px; }
    label {
      display: block;
      font-size: 0.82rem;
      color: #555;
      font-weight: 500;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #0078d4; }
    button {
      width: 100%;
      padding: 11px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #006cbd; }
    .error {
      background: #fff3f3;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      padding: 10px 14px;
      color: #b91c1c;
      font-size: 0.82rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="icon">📊</div>
      <h1>Power BI 보고서 뷰어</h1>
      <p>사내 보고서 조회 시스템</p>
    </div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="csrf" value="{{ csrf_token }}">
      <label for="username">아이디</label>
      <input id="username" name="username" type="text" placeholder="사용자 아이디" required autofocus>
      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" placeholder="비밀번호" required>
      <button type="submit">로그인</button>
    </form>
  </div>
</body>
</html>
