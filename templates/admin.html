<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 포털 - qualisoft BI 포털</title>
  <link rel="stylesheet" href="/static/dist/app.css">
  <script>
    window.__BOOTSTRAP__ = {
      page: "admin",
      data: {
        user: {
          display_name: {{ user.display_name | tojson }},
          is_admin: {{ (user.is_admin or False) | tojson }}
        },
        stats: {
          active_users: {{ stats.active_users | tojson }},
          active_reports: {{ stats.active_reports | tojson }},
          today_uploads: {{ stats.today_uploads | tojson }},
          today_success: {{ stats.today_success | tojson }}
        },
        users: [
          {%- for u in users %}
          {
            "id": {{ u.id | tojson }},
            "username": {{ u.username | tojson }},
            "display_name": {{ u.display_name | tojson }},
            "pbi_username": {{ u.pbi_username | tojson }},
            "roles": {{ u.roles | tojson }},
            "is_admin": {{ (u.is_admin or False) | tojson }},
            "is_active": {{ (u.is_active or False) | tojson }},
            "report_count": {{ u.report_count | tojson }},
            "last_login_at": {{ (u.last_login_at.strftime('%Y-%m-%d %H:%M:%S') if u.last_login_at else None) | tojson }}
          }{{ "," if not loop.last else "" }}
          {%- endfor %}
        ],
        reports: [
          {%- for r in reports %}
          {
            "id": {{ r.id | tojson }},
            "name": {{ r.name | tojson }},
            "report_type": {{ r.report_type | tojson }},
            "status": {{ r.status | tojson }},
            "owner_username": {{ r.owner_username | tojson }},
            "category": {{ r.category | tojson }},
            "viewer_count": {{ r.viewer_count | tojson }},
            "pbi_dataset_id": {{ r.pbi_dataset_id | tojson }},
            "created_at": {{ (r.created_at.strftime('%Y-%m-%d') if r.created_at else None) | tojson }}
          }{{ "," if not loop.last else "" }}
          {%- endfor %}
        ],
        jobs: [
          {%- for j in jobs %}
          {
            "id": {{ j.id | tojson }},
            "username": {{ j.username | tojson }},
            "report_name": {{ j.report_name | tojson }},
            "status": {{ j.status | tojson }},
            "error_message": {{ j.error_message | tojson }},
            "created_at": {{ (j.created_at.strftime('%m-%d %H:%M:%S') if j.created_at else None) | tojson }},
            "updated_at": {{ (j.updated_at.strftime('%m-%d %H:%M:%S') if j.updated_at else None) | tojson }}
          }{{ "," if not loop.last else "" }}
          {%- endfor %}
        ],
        csrf_token: {{ csrf_token | tojson }}
      }
    };
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/static/dist/app.js"></script>
</body>
</html>
