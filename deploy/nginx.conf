# /etc/nginx/sites-available/powerbi-gateway
# 심볼릭 링크: sudo ln -s /etc/nginx/sites-available/powerbi-gateway /etc/nginx/sites-enabled/
#
# 인증서 생성: bash scripts/setup_ssl.sh
# 클라이언트 신뢰 등록: scripts/setup_ssl.sh 하단 안내 참고

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;   # IP 또는 호스트명으로 접속 모두 수용

    # 사내 자체 서명 인증서 (scripts/setup_ssl.sh 로 생성)
    ssl_certificate     /etc/ssl/powerbi-gateway/cert.pem;
    ssl_certificate_key /etc/ssl/powerbi-gateway/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # .pbix 업로드 최대 크기 (1GB + 여유)
    client_max_body_size 1025m;

    # Fabric Import API 폴링 대기 (최대 5분 + 여유)
    proxy_read_timeout 360s;
    proxy_send_timeout 360s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass         http://127.0.0.1:8247;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / 스트리밍 대응 (업로드 폴링)
        proxy_buffering    off;
        proxy_cache        off;
    }
}
