# /etc/nginx/sites-available/powerbi-gateway
# 심볼릭 링크: sudo ln -s /etc/nginx/sites-available/powerbi-gateway /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;

    # Let's Encrypt 갱신용 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지는 전부 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name your-domain.com;

    # SSL 인증서 (certbot으로 발급: sudo certbot --nginx -d your-domain.com)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # .pbix 업로드 최대 크기 (1GB + 여유)
    client_max_body_size 1025m;

    # Fabric Import API 폴링 대기 최대 5분 + 여유
    proxy_read_timeout 360s;
    proxy_send_timeout 360s;

    location / {
        proxy_pass         http://127.0.0.1:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / 스트리밍 대응
        proxy_buffering    off;
        proxy_cache        off;
    }
}
